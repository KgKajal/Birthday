<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Birthday Greeting</title>
  <link rel="stylesheet" href="birthday.css">
  <link href="https://fonts.googleapis.com/css?family=Pacifico&display=swap" rel="stylesheet">
</head>

<body>

  <div class="container">
    <p>MAY ALL OF YOUR BIRTHDAY WISHES COME TRUE</p>
    <h1>HAPPY BIRTHDAY</h1>
    <img src="birthday-cake.png" alt="Birthday Cake" class="cake" />
    <div class="gifts-carousel">
      <button class="carousel-btn left">&#8592;</button>
      <div class="gifts-window">
        <div class="gifts">
          <div class="gift"><img src="gift1.png" alt="Gift 1" /></div>
          <div class="gift"><img src="gift2.png" alt="Gift 2" /></div>
          <div class="gift"><img src="gift3.png" alt="Gift 3" /></div>
          <div class="gift"><img src="gift1.png" alt="Gift 1" /></div>
          <div class="gift"><img src="gift2.png" alt="Gift 2" /></div>
          <div class="gift"><img src="gift3.png" alt="Gift 3" /></div>
          <div class="gift"><img src="gift1.png" alt="Gift 1" /></div>
          <div class="gift"><img src="gift2.png" alt="Gift 2" /></div>
          <div class="gift"><img src="gift3.png" alt="Gift 3" /></div>
          <div class="gift"><img src="gift1.png" alt="Gift 1" /></div>
          <div class="gift"><img src="gift2.png" alt="Gift 2" /></div>
          <div class="gift"><img src="gift3.png" alt="Gift 3" /></div>
        </div>
      </div>
      <button class="carousel-btn right">&#8594;</button>
    </div>
  </div>

  <script>
    const gifts = document.querySelector('.gifts');
    const giftCount = document.querySelectorAll('.gift').length;
    const visible = 4;
    let start = 0;

    document.querySelector('.carousel-btn.left').onclick = function () {
      if (start > 0) {
        start--;
        gifts.style.transform = `translateX(-${start * 90}px)`;
      }
    };

    document.querySelector('.carousel-btn.right').onclick = function () {
      if (start < giftCount - visible) {
        start++;
        gifts.style.transform = `translateX(-${start * 90}px)`;
      }
    };

  </script>

</body>

</html>
